<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理コンソール</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .grid-layout { display: grid; grid-template-columns: 380px 1fr; gap: 24px; }
        @media (max-width: 1024px) { .grid-layout { grid-template-columns: 1fr; } }
        .loader { border: 2px solid #f3f3f3; border-top: 2px solid #0f172a; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .tab-active { border-bottom: 2px solid #2563eb; color: #2563eb; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-100 p-4 md:p-8 text-slate-800 font-sans min-h-screen">

    <div class="max-w-[1600px] mx-auto">
        <header class="flex justify-between items-center mb-8 bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white font-black">A</div>
                <h1 class="text-2xl font-black text-slate-900 tracking-tighter uppercase">Project <span class="text-blue-600">Engine</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <label class="text-xs font-bold text-slate-500 flex items-center gap-1.5 cursor-pointer hover:text-blue-600 transition">
                    <input type="checkbox" id="showArchived" onchange="loadAll()" class="w-4 h-4 rounded border-slate-300"> 書庫(アーカイブ)も表示
                </label>
                <span id="loadingIndicator" class="hidden flex items-center text-xs font-bold text-slate-400 gap-2"><div class="loader"></div>通信中...</span>
                <button onclick="loadAll()" class="bg-slate-900 text-white px-5 py-2.5 rounded-xl text-xs font-bold hover:bg-slate-800 active:scale-95 transition shadow-lg">更新</button>
            </div>
        </header>

        <div class="grid-layout">
            <div class="space-y-6">
                <!-- ユーザー作成 -->
                <div class="bg-white p-6 rounded-3xl shadow-sm border">
                    <h2 class="text-[10px] font-black text-slate-400 uppercase mb-5 border-b pb-2">1. ユーザー管理</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-slate-500 ml-1">対象ID (空なら新規)</label>
                            <input type="text" id="targetUserId" placeholder="自動生成されます" class="w-full p-3 bg-slate-50 rounded-xl text-sm font-mono mt-1 border outline-none">
                        </div>
                        <div class="flex gap-3">
                            <input type="text" id="ln" placeholder="姓" class="w-1/2 p-3 bg-slate-50 rounded-xl text-sm border outline-none">
                            <input type="text" id="fn" placeholder="名" class="w-1/2 p-3 bg-slate-50 rounded-xl text-sm border outline-none">
                        </div>
                        <input type="date" id="dob" class="w-full p-3 bg-slate-50 rounded-xl text-sm border outline-none text-slate-500">
                        <label class="flex items-center text-sm p-2 font-bold bg-slate-50 rounded-xl border cursor-pointer">
                            <input type="checkbox" id="isFriend" class="mr-3 w-5 h-5 rounded border-slate-300"> 知り合いフラグ
                        </label>
                        <button onclick="saveUser()" class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold text-sm shadow-md hover:bg-blue-700 transition">ユーザー保存</button>
                    </div>
                </div>

                <!-- PJ作成 -->
                <div class="bg-white p-6 rounded-3xl shadow-sm border">
                    <h2 class="text-[10px] font-black text-slate-400 uppercase mb-5 border-b pb-2">2. プロジェクト作成</h2>
                    <div class="space-y-4">
                        <input type="text" id="pjUserId" placeholder="紐付けるUser ID" class="w-full p-3 bg-slate-50 rounded-xl text-sm border outline-none font-mono">
                        <input type="text" id="respondent" placeholder="対応者名 / 案件名" class="w-full p-3 bg-slate-50 rounded-xl text-sm border outline-none">
                        <div class="p-4 bg-slate-50 rounded-2xl border space-y-3">
                            <p class="text-[10px] font-bold text-slate-500 uppercase">初期費用</p>
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-bold text-slate-400">¥</span>
                                <input type="number" id="totalAmt" placeholder="本体総額" class="w-full p-3 bg-white rounded-xl text-sm border outline-none font-bold">
                            </div>
                            <div class="flex gap-2">
                                <select id="feeType" class="w-1/3 p-3 bg-white rounded-xl text-xs border outline-none font-bold">
                                    <option value="percent">手数料 %</option><option value="flat">手数料 固定(¥)</option>
                                </select>
                                <input type="number" id="feeValue" placeholder="値" class="w-2/3 p-3 bg-white rounded-xl text-sm border outline-none">
                            </div>
                        </div>
                        <button onclick="createPj()" class="w-full bg-slate-900 text-white py-3.5 rounded-xl font-bold text-sm hover:bg-slate-800 transition">プロジェクト作成</button>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <!-- PJ一覧 -->
                <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
                    <table class="w-full text-left text-sm">
                        <thead class="bg-slate-50 text-slate-500 font-bold border-b text-xs">
                            <tr><th class="p-4">顧客 / PJ</th><th class="p-4">進捗</th><th class="p-4">状態</th><th class="p-4 text-right">操作</th></tr>
                        </thead>
                        <tbody id="pjTableBody" class="divide-y divide-slate-100"></tbody>
                    </table>
                </div>

                <!-- 詳細パネル -->
                <div id="adminDetailPanel" class="hidden bg-white rounded-3xl shadow-2xl border-2 border-blue-500 relative scroll-mt-10 overflow-hidden flex flex-col h-[850px]">
                    <div class="p-6 border-b bg-slate-50 flex justify-between items-center shrink-0">
                        <div>
                            <h2 class="text-2xl font-black text-slate-900 font-mono" id="detailTitle">PJ-XXXXX</h2>
                            <p class="text-xs font-bold text-slate-500 mt-1">管理ダッシュボード</p>
                        </div>
                        <button onclick="closePanel()" class="text-slate-400 hover:text-slate-900 bg-white border p-2 rounded-full transition">&times;</button>
                    </div>

                    <div class="flex border-b bg-white shrink-0 px-6 pt-2 overflow-x-auto hide-scrollbar">
                        <button onclick="switchTab('overview')" id="tab-overview" class="whitespace-nowrap px-4 py-3 text-sm font-bold tab-active">ステータス管理</button>
                        <button onclick="switchTab('payment')" id="tab-payment" class="whitespace-nowrap px-4 py-3 text-sm font-bold text-slate-400">支払い・分割</button>
                        <button onclick="switchTab('chat')" id="tab-chat" class="whitespace-nowrap px-4 py-3 text-sm font-bold text-slate-400">チャット</button>
                        <button onclick="switchTab('history')" id="tab-history" class="whitespace-nowrap px-4 py-3 text-sm font-bold text-slate-400">履歴ログ</button>
                    </div>

                    <div class="flex-1 overflow-y-auto p-6 bg-slate-50 relative">
                        <!-- ステータス管理 -->
                        <div id="content-overview" class="tab-pane space-y-5 max-w-lg mx-auto">
                            <div class="bg-white p-5 rounded-2xl border shadow-sm space-y-4">
                                <div>
                                    <label class="text-[10px] font-bold text-slate-500">進捗ステータス</label>
                                    <select id="editStatus" class="w-full p-3 bg-slate-50 rounded-xl text-sm font-bold border outline-none mt-1">
                                        <option value="受注完了">受注完了</option><option value="作業中">作業中</option><option value="レビュー中">レビュー中</option>
                                        <option value="支払い待ち">支払い待ち</option><option value="納品完了">納品完了</option><option value="完了">完了 (アーカイブ推奨)</option>
                                    </select>
                                </div>
                                
                                <div class="bg-red-50 p-3 rounded-xl border border-red-200">
                                    <label class="text-[10px] font-black text-red-600 uppercase flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg> 滞納・警告メッセージ (顧客最上部に表示)</label>
                                    <textarea id="editWarning" placeholder="空欄の場合は表示されません" class="w-full p-3 bg-white rounded-xl text-sm h-16 border outline-none resize-none mt-2 focus:border-red-400"></textarea>
                                </div>

                                <div><label class="text-[10px] font-bold text-slate-500">詳細レポート(Markdown対応: # 大見出し)</label>
                                <textarea id="editSubStatus" placeholder="顧客に見える進捗レポート" class="w-full p-3 bg-slate-50 rounded-xl text-sm h-24 border outline-none resize-none mt-1"></textarea></div>
                                
                                <div class="flex gap-3">
                                    <div class="w-1/2"><label class="text-[10px] font-bold text-slate-500">担当者</label>
                                    <input type="text" id="editStaff" class="w-full p-3 bg-slate-50 rounded-xl text-sm border outline-none mt-1"></div>
                                    <div class="w-1/2"><label class="text-[10px] font-bold text-slate-500">内部状態</label>
                                    <select id="editWorkState" class="w-full p-3 bg-slate-50 rounded-xl text-sm font-bold border outline-none mt-1">
                                        <option value="作業中">🟢 作業中</option><option value="中断中">🟡 中断中</option><option value="トラブル">🔴 トラブル</option>
                                    </select></div>
                                </div>
                                <button onclick="saveStatus()" class="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold shadow-md hover:bg-blue-700 mt-4 transition">更新して履歴に残す</button>
                            </div>
                        </div>

                        <!-- 支払い管理 -->
                        <div id="content-payment" class="tab-pane hidden space-y-4">
                            <!-- ジェネレータ -->
                            <details class="bg-white p-4 rounded-2xl border shadow-sm group">
                                <summary class="text-xs font-black text-blue-600 uppercase flex items-center gap-1 cursor-pointer outline-none">⚙️ 高度なスケジュール自動生成 <span class="text-slate-400 font-normal ml-2 group-open:hidden">(クリックで展開)</span></summary>
                                <div class="mt-4 pt-4 border-t border-slate-100">
                                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3">
                                        <div class="col-span-2 md:col-span-1">
                                            <label class="text-[10px] font-bold text-slate-500 block mb-1">ルール</label>
                                            <select id="genRule" onchange="toggleRuleInputs()" class="w-full p-2.5 bg-slate-50 rounded-lg text-xs border outline-none font-bold text-blue-700">
                                                <option value="daily">毎日（連続）</option><option value="weekday">平日のみ（月〜金）</option><option value="weekend">休日のみ（土日）</option>
                                                <option value="weekly_custom">毎週指定曜日</option><option value="monthly_custom">毎月指定日</option><option value="specific_dates">指定日のみ(手動設定)</option>
                                            </select>
                                        </div>
                                        <div><label class="text-[10px] font-bold text-slate-500 block mb-1">開始日</label><input type="date" id="genStart" class="w-full p-2.5 bg-slate-50 rounded-lg text-xs border outline-none"></div>
                                        <div><label class="text-[10px] font-bold text-slate-500 block mb-1">分割回数</label><input type="number" id="genCount" value="1" min="1" class="w-full p-2.5 bg-slate-50 rounded-lg text-xs border outline-none font-bold"></div>
                                    </div>
                                    
                                    <div id="ruleDynamicArea" class="p-3 bg-slate-50 rounded-xl border mb-3 hidden">
                                        <div id="area-weekly" class="hidden text-xs">
                                            <p class="font-bold mb-2">曜日を選択:</p>
                                            <div class="flex gap-2 flex-wrap"><label><input type="checkbox" name="cDay" value="1" class="mr-1">月</label><label><input type="checkbox" name="cDay" value="2" class="mr-1">火</label><label><input type="checkbox" name="cDay" value="3" class="mr-1">水</label><label><input type="checkbox" name="cDay" value="4" class="mr-1">木</label><label><input type="checkbox" name="cDay" value="5" class="mr-1">金</label><label><input type="checkbox" name="cDay" value="6" class="mr-1 text-blue-500">土</label><label><input type="checkbox" name="cDay" value="0" class="mr-1 text-red-500">日</label></div>
                                        </div>
                                        <div id="area-monthly" class="hidden text-xs flex items-center gap-2">
                                            <p class="font-bold">毎月</p><input type="number" id="cDateNum" min="1" max="31" value="25" class="w-16 p-1.5 border rounded outline-none text-center"> <p class="font-bold">日</p>
                                        </div>
                                    </div>

                                    <div class="mb-3 p-3 bg-slate-50 border rounded-xl grid grid-cols-2 gap-3 text-[10px]">
                                        <div><label class="font-bold block mb-1 text-blue-600">追加日 (ルール無視で含める)</label><input type="text" id="addDates" placeholder="2023-11-01,2023-11-05" class="w-full p-2 border rounded outline-none"></div>
                                        <div><label class="font-bold block mb-1 text-red-500">単発除外日</label><input type="text" id="exDates" placeholder="2023-11-03" class="w-full p-2 border rounded outline-none"></div>
                                        <div class="col-span-2">
                                            <label class="font-bold text-red-500 block mb-1">期間除外 (複数可):</label>
                                            <div id="exPeriodsContainer" class="space-y-1 mb-1"></div>
                                            <button type="button" onclick="addExPeriod()" class="text-blue-600 font-bold border border-blue-200 bg-white px-2 py-1 rounded">+ 期間を追加</button>
                                        </div>
                                    </div>
                                    <button onclick="generateSchedule()" class="w-full bg-slate-800 text-white py-3 rounded-xl text-xs font-bold hover:bg-slate-700 shadow-md transition">この条件でスケジュールを上書き生成</button>
                                </div>
                            </details>

                            <!-- 一括変更＆追加請求ツールバー -->
                            <div class="flex gap-2">
                                <div class="bg-white p-3 rounded-xl border shadow-sm flex-1 flex items-center justify-between">
                                    <span class="text-[10px] font-bold text-slate-500">未払いの支払方法を一括変更:</span>
                                    <div class="flex gap-1">
                                        <select id="bulkMethod" class="text-[10px] p-1.5 border rounded outline-none font-bold">
                                            <option value="現金">現金</option><option value="PayPay">PayPay</option><option value="振込">振込</option><option value="未定">未定</option>
                                        </select>
                                        <button onclick="bulkUpdateMethod()" class="bg-slate-800 text-white text-[10px] font-bold px-3 py-1.5 rounded hover:bg-slate-700">適用</button>
                                    </div>
                                </div>
                                <button onclick="document.getElementById('extraPayBox').classList.toggle('hidden')" class="bg-emerald-50 text-emerald-700 border border-emerald-200 text-xs font-bold px-4 py-2 rounded-xl hover:bg-emerald-100 transition whitespace-nowrap shadow-sm">+ 追加請求</button>
                            </div>

                            <div id="extraPayBox" class="bg-emerald-50 p-4 rounded-xl border border-emerald-200 hidden shadow-sm">
                                <h4 class="text-[10px] font-black text-emerald-800 mb-2">追加請求（オプション等）の登録</h4>
                                <div class="flex gap-2">
                                    <input type="date" id="exPayDate" class="p-2 text-xs border rounded outline-none w-1/4">
                                    <input type="number" id="exPayAmt" placeholder="金額(¥)" class="p-2 text-xs border rounded outline-none w-1/4 font-bold">
                                    <input type="text" id="exPayNote" placeholder="メモ" class="p-2 text-xs border rounded outline-none flex-1">
                                    <button onclick="addExtraPayment()" class="bg-emerald-600 text-white px-4 py-2 rounded text-xs font-bold hover:bg-emerald-700">登録</button>
                                </div>
                            </div>

                            <div class="p-3 bg-blue-50 text-blue-800 rounded-xl text-sm font-black border border-blue-100 flex justify-between">
                                <span>総額: <span id="dispGrandTotal">¥0</span></span><span class="text-[10px] font-normal opacity-80 mt-1">金額変更で最終項目自動調整</span>
                            </div>

                            <div class="bg-white border rounded-2xl p-2 space-y-2 max-h-[400px] overflow-y-auto" id="schedEditList"></div>
                        </div>

                        <!-- チャット -->
                        <div id="content-chat" class="tab-pane hidden max-w-lg mx-auto">
                            <div class="bg-white rounded-2xl border shadow-sm p-4">
                                <div id="adminChatBox" class="h-[500px] overflow-y-auto space-y-4 mb-4 pr-2"></div>
                                <div class="flex gap-2">
                                    <input type="text" id="adminChatInput" placeholder="顧客へのメッセージ..." class="flex-1 p-3 bg-slate-50 rounded-xl text-sm border outline-none focus:bg-white focus:ring-2 focus:ring-blue-100">
                                    <button onclick="sendAdminMsg()" class="bg-blue-600 text-white px-5 rounded-xl font-bold shadow-md hover:bg-blue-700 active:scale-95 transition">送信</button>
                                </div>
                            </div>
                        </div>

                        <!-- 履歴 -->
                        <div id="content-history" class="tab-pane hidden max-w-lg mx-auto">
                            <div class="bg-white p-6 rounded-2xl border shadow-sm">
                                <div id="adminHistoryList" class="relative space-y-5 pl-5 border-l-2 border-slate-200 ml-2"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwSbnrFffcQtz-MlJo48xIDeHYYpUJDo-0JwxN83aB72KUVYAdknNfOez6juCksBPER4g/exec";
        
        let activePid = null;
        let currentGrandTotal = 0;
        let chatTimer = null;
        let adminMessages = [];
        let lastMsgCount = 0;
        let archivedPjs = JSON.parse(localStorage.getItem('archived_pjs') || '[]');

        document.getElementById('genStart').valueAsDate = new Date();
        document.getElementById('exPayDate').valueAsDate = new Date();

        function switchTab(t) {
            document.querySelectorAll('.tab-pane').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('[id^="tab-"]').forEach(el => el.classList.remove('tab-active', 'text-slate-900'));
            document.getElementById(`content-${t}`).classList.remove('hidden');
            document.getElementById(`tab-${t}`).classList.add('tab-active', 'text-slate-900');
            if(t === 'chat') { refreshAdminChat(true); chatTimer = setInterval(()=>refreshAdminChat(false), 5000); }
            else { clearInterval(chatTimer); }
        }

        // アーカイブ機能 (フロント側でのみ制御)
        function toggleArchive(pid) {
            if (archivedPjs.includes(pid)) archivedPjs = archivedPjs.filter(id => id !== pid);
            else archivedPjs.push(pid);
            localStorage.setItem('archived_pjs', JSON.stringify(archivedPjs));
            loadAll();
        }

        function toggleRuleInputs() {
            const rule = document.getElementById('genRule').value;
            const dyn = document.getElementById('ruleDynamicArea');
            const aw = document.getElementById('area-weekly');
            const am = document.getElementById('area-monthly');
            const cInput = document.getElementById('genCount');
            dyn.classList.add('hidden'); aw.classList.add('hidden'); am.classList.add('hidden'); cInput.disabled = false;
            if(rule === 'weekly_custom') { dyn.classList.remove('hidden'); aw.classList.remove('hidden'); }
            if(rule === 'monthly_custom') { dyn.classList.remove('hidden'); am.classList.remove('hidden'); }
            if(rule === 'specific_dates') { cInput.disabled = true; cInput.value = '自動'; }
        }

        function addExPeriod() {
            const div = document.createElement('div');
            div.className = "flex gap-2 items-center ex-period-row mb-1";
            div.innerHTML = `<input type="date" class="p-1 border rounded outline-none ex-start"> <span class="text-slate-400">〜</span> <input type="date" class="p-1 border rounded outline-none ex-end"> <button type="button" onclick="this.parentElement.remove()" class="text-red-500 font-bold ml-1 hover:text-red-700 bg-red-50 w-6 h-6 rounded-full flex items-center justify-center">&times;</button>`;
            document.getElementById('exPeriodsContainer').appendChild(div);
        }

        function toggleLoading(s) { document.getElementById('loadingIndicator').style.display = s ? 'flex' : 'none'; }

        async function callApi(payload, method = 'GET', silent=false) {
            if(!silent) toggleLoading(true);
            const url = new URL(API_URL);
            const options = { method, mode: 'cors' };
            if (method === 'GET') Object.keys(payload).forEach(k => url.searchParams.append(k, payload[k]));
            else { options.headers = { 'Content-Type': 'text/plain' }; options.body = JSON.stringify(payload); }
            try {
                const res = await fetch(url.toString(), options);
                const data = await res.json();
                if(!silent) toggleLoading(false);
                if(data.error && !silent) alert("エラー: " + data.error);
                return data;
            } catch (e) {
                if(!silent) { toggleLoading(false); alert("通信エラー"); }
                return { success: false };
            }
        }

        async function loadAll() {
            const res = await callApi({ action: 'getAllProjects' });
            if(!res.success) return;
            const body = document.getElementById('pjTableBody');
            const showArchived = document.getElementById('showArchived').checked;

            let projects = res.projects;
            if (!showArchived) projects = projects.filter(pj => !archivedPjs.includes(pj.projectId));

            body.innerHTML = projects.map(pj => {
                const isArch = archivedPjs.includes(pj.projectId);
                return `
                <tr class="hover:bg-blue-50 transition border-b ${isArch ? 'opacity-60 bg-slate-50' : ''}">
                    <td class="p-4 cursor-pointer" onclick="openDetail('${pj.projectId}')">
                        <div class="font-black text-slate-800 text-base flex items-center gap-2">
                            ${pj.userName} ${isArch ? '<span class="text-[9px] bg-slate-200 text-slate-600 px-1.5 py-0.5 rounded">書庫</span>' : ''}
                        </div>
                        <div class="text-[10px] text-slate-400 mt-0.5">${pj.projectId}</div>
                    </td>
                    <td class="p-4 cursor-pointer" onclick="openDetail('${pj.projectId}')"><span class="text-[10px] font-black px-2.5 py-1 bg-white text-slate-600 rounded-lg border shadow-sm">${pj.status}</span></td>
                    <td class="p-4 cursor-pointer" onclick="openDetail('${pj.projectId}')"><span class="text-xs font-bold ${pj.workState === '作業中' ? 'text-green-600' : 'text-red-500'}">${pj.workState}</span></td>
                    <td class="p-4 text-right flex justify-end gap-2 items-center h-full pt-4">
                        <button onclick="toggleArchive('${pj.projectId}')" class="text-slate-500 text-xs bg-white border border-slate-200 px-2.5 py-1.5 rounded-lg hover:bg-slate-100 transition">${isArch ? '復元' : '書庫へ'}</button>
                        <button onclick="openDetail('${pj.projectId}')" class="text-blue-600 font-bold text-xs bg-white border border-blue-100 shadow-sm px-3 py-1.5 rounded-lg hover:bg-blue-50 transition">管理</button>
                    </td>
                </tr>
            `}).join('');
        }

        async function openDetail(pid) {
            activePid = pid;
            const res = await callApi({ action: 'getProjectDetail', projectId: pid });
            if(!res.success) return;
            const pj = res.project;
            
            document.getElementById('adminDetailPanel').classList.remove('hidden');
            document.getElementById('adminDetailPanel').scrollIntoView({ behavior: 'smooth' });
            document.getElementById('detailTitle').innerText = pid;
            
            const sel = document.getElementById('editStatus');
            const stsOpts = ['受注完了','作業中','レビュー中','支払い待ち','納品完了','完了'];
            sel.innerHTML = stsOpts.map(s => `<option value="${s}" ${pj.status===s?'selected':''}>${s}</option>`).join('');
            document.getElementById('editWarning').value = pj.warningMsg || '';
            document.getElementById('editSubStatus').value = pj.subStatus || '';
            document.getElementById('editStaff').value = pj.staff || '';
            document.getElementById('editWorkState').value = pj.workState;

            const feeVal = pj.payment.feeDetail.calculatedFee || 0;
            currentGrandTotal = Number(pj.payment.totalAmount) + feeVal;
            document.getElementById('dispGrandTotal').innerText = `¥${currentGrandTotal.toLocaleString()}`;
            renderSchedule(pj.payment.schedule);

            const histRes = await callApi({ action: 'getProjectHistory', projectId: pid });
            document.getElementById('adminHistoryList').innerHTML = histRes.history.map(h => `
                <div class="relative">
                    <div class="absolute -left-[27px] top-1 w-3.5 h-3.5 rounded-full ${h.type === 'Status' ? 'bg-blue-500' : 'bg-slate-300'} border-2 border-white shadow-sm"></div>
                    <div class="mb-4">
                        <p class="text-[10px] text-slate-400 font-bold mb-1">${new Date(h.timestamp).toLocaleString('ja-JP')} / <span class="uppercase tracking-widest">${h.author}</span></p>
                        <p class="text-xs font-bold text-slate-700 bg-white p-3 rounded-xl border border-slate-200 shadow-sm leading-relaxed">${h.message}</p>
                    </div>
                </div>
            `).join('');

            switchTab('overview');
        }

        function renderSchedule(sched) {
            const list = document.getElementById('schedEditList');
            if(!sched || sched.length === 0) return list.innerHTML = `<p class="text-center text-xs text-slate-400 p-4">なし</p>`;
            list.innerHTML = sched.map((s, i) => `
                <div class="grid grid-cols-12 gap-1.5 bg-slate-50 p-2.5 rounded-xl border items-center hover:border-blue-300 transition relative">
                    <input type="date" value="${s.date}" onchange="updateSchedItem(${i}, 'date', this.value)" class="col-span-3 text-[10px] p-1.5 border rounded outline-none font-bold text-slate-600">
                    <div class="col-span-2 relative">
                        <input type="number" value="${s.amount}" onchange="updateSchedItem(${i}, 'amount', this.value)" class="w-full text-[11px] p-1.5 pl-4 border rounded outline-none font-black text-slate-800 focus:ring-1 focus:ring-blue-400">
                    </div>
                    <select onchange="updateSchedItem(${i}, 'status', this.value)" class="col-span-2 text-[10px] p-1.5 border rounded outline-none font-bold">
                        <option value="未払い" ${s.status === '未払い' ? 'selected' : ''}>未払い</option><option value="支払い済み" ${s.status === '支払い済み' ? 'selected' : ''}>済</option>
                        <option value="振替済" ${s.status === '振替済' ? 'selected' : ''}>振替済</option><option value="代理" ${s.status === '代理' ? 'selected' : ''}>代理</option>
                    </select>
                    <select onchange="updateSchedItem(${i}, 'method', this.value)" class="col-span-2 text-[10px] p-1.5 border rounded outline-none">
                        <option value="未定" ${s.method === '未定' ? 'selected' : ''}>未定</option><option value="現金" ${s.method === '現金' ? 'selected' : ''}>現金</option>
                        <option value="PayPay" ${s.method === 'PayPay' ? 'selected' : ''}>PayPay</option><option value="振込" ${s.method === '振込' ? 'selected' : ''}>振込</option>
                    </select>
                    <div class="col-span-3 flex gap-1 items-center">
                        <input type="text" value="${s.note || ''}" placeholder="メモ" onblur="updateSchedItem(${i}, 'note', this.value)" class="flex-1 text-[9px] p-1.5 border rounded outline-none text-slate-500">
                        ${(s.status === '未払い' && i < sched.length - 1) ? `<button onclick="transferPayment(${i})" class="bg-orange-100 text-orange-700 border border-orange-200 text-[9px] font-bold px-1.5 py-1 rounded hover:bg-orange-200 transition" title="この金額を次回に合算">振替</button>` : ''}
                    </div>
                </div>
            `).join('');
        }

        async function updateSchedItem(idx, key, val) {
            await callApi({ action: 'updatePaymentDetail', projectId: activePid, index: idx, key: key, val: val }, 'POST');
            if(key === 'amount') openDetail(activePid);
        }

        async function transferPayment(idx) {
            if(!confirm("未払い額を次回に合算（振替）しますか？")) return;
            await callApi({ action: 'transferPayment', projectId: activePid, index: idx }, 'POST'); openDetail(activePid);
        }

        async function bulkUpdateMethod() {
            const method = document.getElementById('bulkMethod').value;
            if(!confirm(`未払いの項目の支払方法をすべて「${method}」に変更しますか？`)) return;
            await callApi({ action: 'bulkUpdatePaymentMethod', projectId: activePid, method: method }, 'POST'); openDetail(activePid);
        }

        async function addExtraPayment() {
            const date = document.getElementById('exPayDate').value;
            const amt = document.getElementById('exPayAmt').value;
            const note = document.getElementById('exPayNote').value;
            if(!amt) return alert("金額を入力してください");
            await callApi({ action: 'addExtraPayment', projectId: activePid, date: date, addAmount: amt, note: note }, 'POST');
            document.getElementById('exPayAmt').value = ''; document.getElementById('exPayNote').value = '';
            openDetail(activePid);
        }

        async function generateSchedule() {
            if(!activePid || !currentGrandTotal) return;
            const rule = document.getElementById('genRule').value;
            let customDays = [];
            if(rule === 'weekly_custom') {
                document.querySelectorAll('input[name="cDay"]:checked').forEach(e => customDays.push(e.value));
                if(customDays.length === 0) return alert("曜日を選択してください");
            }
            let exPeriods = [];
            document.querySelectorAll('.ex-period-row').forEach(row => {
                const s = row.querySelector('.ex-start').value; const e = row.querySelector('.ex-end').value;
                if(s && e) exPeriods.push({start: s, end: e});
            });

            const data = { 
                action: 'generateSchedule', projectId: activePid, grandTotal: currentGrandTotal, 
                rule: rule, startDate: document.getElementById('genStart').value, count: document.getElementById('genCount').value,
                customDays: customDays, customDate: document.getElementById('cDateNum').value,
                addDates: document.getElementById('addDates').value.split(',').map(s=>s.trim()).filter(s=>s),
                exDates: document.getElementById('exDates').value.split(',').map(s=>s.trim()).filter(s=>s),
                exPeriods: exPeriods
            };
            if(!data.startDate && rule !== 'specific_dates') return alert("開始日を指定してください");
            const res = await callApi(data, 'POST');
            if(res.success) { document.getElementById('exPeriodsContainer').innerHTML=''; openDetail(activePid); }
        }

        async function saveStatus() {
            await callApi({ action: 'updateStatus', projectId: activePid, status: document.getElementById('editStatus').value, warningMsg: document.getElementById('editWarning').value, subStatus: document.getElementById('editSubStatus').value, staff: document.getElementById('editStaff').value, workState: document.getElementById('editWorkState').value }, 'POST');
            openDetail(activePid); loadAll();
        }

        // ★ チャットの楽観的UI更新
        async function sendAdminMsg() {
            const input = document.getElementById('adminChatInput');
            const msg = input.value.trim();
            if(!msg) return;
            input.value = '';
            
            // 即時UI反映
            adminMessages.push({ sender: 'admin', message: msg, timestamp: '送信中...' });
            renderAdminMessages(true);

            await callApi({ action: 'sendMessage', projectId: activePid, sender: 'admin', message: msg }, 'POST', true);
            refreshAdminChat(true);
        }

        async function refreshAdminChat(forceScroll = false) {
            if(!activePid) return;
            const res = await callApi({ action: 'getMessages', projectId: activePid }, 'GET', true);
            if(res.success) {
                adminMessages = res.messages;
                renderAdminMessages(forceScroll);
            }
        }

        function renderAdminMessages(forceScroll = false) {
            const box = document.getElementById('adminChatBox');
            lastMsgCount = adminMessages.length;

            box.innerHTML = adminMessages.map(m => {
                const isMe = m.sender === 'admin';
                const dateObj = new Date(m.timestamp);
                const time = isNaN(dateObj) ? '送信中...' : dateObj.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
                return `
                <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} mb-4">
                    <span class="text-[9px] text-slate-400 font-bold mb-1 mx-1 tracking-widest">${isMe ? 'YOU' : 'CLIENT'}</span>
                    <div class="flex items-end gap-1.5 ${isMe ? 'flex-row-reverse' : 'flex-row'}">
                        <div class="max-w-[85%] ${isMe ? 'bg-slate-800 text-white rounded-2xl rounded-tr-sm' : 'bg-slate-100 text-slate-800 rounded-2xl rounded-tl-sm border border-slate-200'} p-3.5 shadow-sm text-sm leading-relaxed">${m.message}</div>
                        <span class="text-[9px] font-bold text-slate-400 pb-1">${time}</span>
                    </div>
                </div>`;
            }).join('');
            
            if(forceScroll || box.scrollTop + box.clientHeight >= box.scrollHeight - 50) box.scrollTop = box.scrollHeight;
        }

        async function saveUser() {
            const ln = document.getElementById('ln').value; if(!ln) return alert("姓を入力");
            const res = await callApi({ action: 'updateUser', id: document.getElementById('targetUserId').value.trim(), lastName: ln, firstName: document.getElementById('fn').value, dob: document.getElementById('dob').value, isFriend: document.getElementById('isFriend').checked }, 'POST');
            if(res.success) { document.getElementById('targetUserId').value = res.id; alert(`ユーザー保存完了 ID: ${res.id}`); }
        }

        async function createPj() {
            const uid = document.getElementById('pjUserId').value.trim(); if(!uid) return alert("User ID必須");
            const res = await callApi({ action: 'createProject', userId: uid, respondent: document.getElementById('respondent').value, totalAmount: document.getElementById('totalAmt').value || 0, feeType: document.getElementById('feeType').value, feeValue: document.getElementById('feeValue').value || 0 }, 'POST');
            if(res.success) { alert(`作成完了 ID: ${res.projectId}`); loadAll(); }
        }

        function closePanel() { document.getElementById('adminDetailPanel').classList.add('hidden'); activePid = null; clearInterval(chatTimer); }
        window.onload = loadAll;
    </script>
</body>
</html>
