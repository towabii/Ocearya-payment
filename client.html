<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>顧客ポータル</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .tab-active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .progress-bar { transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 pb-20 font-sans selection:bg-blue-200">

    <div id="loadingOverlay" class="fixed inset-0 bg-white/90 z-50 flex items-center justify-center hidden backdrop-blur-sm">
        <div class="flex flex-col items-center">
            <div class="loader mb-3"></div>
            <p class="text-xs text-slate-500 font-bold tracking-widest uppercase">同期中...</p>
        </div>
    </div>

    <!-- ログイン -->
    <div id="loginSection" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-[2rem] shadow-2xl shadow-blue-900/5 w-full max-w-sm border border-slate-100">
            <div class="w-14 h-14 bg-gradient-to-br from-blue-500 to-blue-600 text-white rounded-2xl flex items-center justify-center mb-6 mx-auto shadow-lg shadow-blue-500/30">
                <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h1 class="text-2xl font-black mb-2 text-center text-slate-900">顧客ポータル</h1>
            <p class="text-xs text-slate-400 text-center mb-6">安全なアクセスIDを入力してください</p>
            <input type="text" id="userIdInput" placeholder="ID-XXXXX" class="w-full p-4 bg-slate-50 rounded-2xl mb-4 outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white font-mono text-center transition shadow-inner">
            <button onclick="login()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-xl shadow-slate-900/20 hover:bg-slate-800 active:scale-[0.98] transition">アクセス</button>
        </div>
    </div>

    <!-- メイン -->
    <div id="mainSection" class="hidden">
        <header class="bg-white/80 backdrop-blur-md border-b sticky top-0 z-40 px-5 py-4 flex justify-between items-center shadow-sm">
            <div>
                <h2 id="userName" class="font-black text-lg text-slate-900">---</h2>
                <p id="displayId" class="text-[10px] text-slate-400 font-mono tracking-wider"></p>
            </div>
            <div class="text-right flex flex-col items-end">
                <p id="clock" class="text-[10px] font-bold text-slate-400 mb-1 font-mono"></p>
                <button onclick="refreshData()" class="px-3 py-1.5 bg-white border border-slate-200 rounded-lg text-[10px] font-bold text-slate-600 hover:bg-slate-50 active:scale-95 shadow-sm transition flex items-center gap-1">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> 更新
                </button>
            </div>
        </header>

        <main class="max-w-md mx-auto p-4 space-y-6">
            <!-- ダッシュボード -->
            <div id="dashboardView">
                <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 pl-1 border-b pb-2">進行中のプロジェクト</h3>
                <div id="projectList" class="space-y-4"></div>
            </div>

            <!-- 詳細画面 -->
            <div id="detailView" class="hidden animate-in fade-in duration-300">
                <button onclick="showDashboard()" class="mb-4 text-slate-500 font-bold bg-white px-4 py-2.5 rounded-xl shadow-sm border border-slate-200 text-sm flex items-center gap-2 hover:bg-slate-50 transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg> 戻る
                </button>
                
                <div id="projectDetailHeader"></div>

                <div class="flex border-b mb-5 mt-3 overflow-x-auto hide-scrollbar sticky top-[72px] bg-slate-50/90 backdrop-blur z-30">
                    <button onclick="switchTab('overview')" id="tab-overview" class="whitespace-nowrap px-4 py-3 text-sm font-bold tab-active transition-colors">概要</button>
                    <button onclick="switchTab('payment')" id="tab-payment" class="whitespace-nowrap px-4 py-3 text-sm font-bold text-slate-400 hover:text-slate-600 transition-colors">支払い</button>
                    <button onclick="switchTab('history')" id="tab-history" class="whitespace-nowrap px-4 py-3 text-sm font-bold text-slate-400 hover:text-slate-600 transition-colors">履歴</button>
                    <button onclick="switchTab('chat')" id="tab-chat" class="whitespace-nowrap px-4 py-3 text-sm font-bold text-slate-400 hover:text-slate-600 transition-colors relative">
                        チャット<span id="chatBadge" class="hidden absolute top-2 right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-slate-50 animate-bounce"></span>
                    </button>
                </div>

                <div id="content-overview" class="tab-pane space-y-4"></div>
                
                <!-- 支払いタブ -->
                <div id="content-payment" class="tab-pane hidden space-y-4">
                    <div id="paymentHeader"></div>
                    <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                        <div class="flex justify-between items-center mb-4 border-b pb-3">
                            <h4 class="text-[10px] font-black text-slate-400 uppercase tracking-widest">スケジュール</h4>
                            <div class="flex gap-1 bg-slate-100 p-1 rounded-lg">
                                <button onclick="togglePayView('list')" id="btn-view-list" class="text-[10px] font-bold px-3 py-1.5 rounded-md bg-white text-slate-800 shadow-sm transition">リスト</button>
                                <button onclick="togglePayView('calendar')" id="btn-view-cal" class="text-[10px] font-bold px-3 py-1.5 rounded-md text-slate-500 hover:text-slate-800 transition">カレンダー</button>
                            </div>
                        </div>
                        <div id="payList" class="space-y-3"></div>
                        <div id="payCalendar" class="hidden"></div>
                    </div>
                </div>

                <div id="content-history" class="tab-pane hidden"><div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200"><div id="historyTimeline" class="relative space-y-6"></div></div></div>
                
                <div id="content-chat" class="tab-pane hidden">
                    <div class="flex gap-2 overflow-x-auto hide-scrollbar mb-3 px-1 py-1">
                        <button onclick="setChatMsg('支払い方法の変更をお願いします。')" class="whitespace-nowrap px-3.5 py-1.5 bg-white text-slate-600 text-[10px] font-bold rounded-full border shadow-sm hover:bg-slate-50 active:scale-95 transition">支払い方法変更</button>
                        <button onclick="setChatMsg('支払いを完了しましたが、同期されていません。ご確認をお願いします。')" class="whitespace-nowrap px-3.5 py-1.5 bg-white text-slate-600 text-[10px] font-bold rounded-full border shadow-sm hover:bg-slate-50 active:scale-95 transition">支払い同期エラー</button>
                        <button onclick="setChatMsg('現在の進捗状況を教えていただけますか？')" class="whitespace-nowrap px-3.5 py-1.5 bg-white text-slate-600 text-[10px] font-bold rounded-full border shadow-sm hover:bg-slate-50 active:scale-95 transition">進捗確認</button>
                        <button onclick="setChatMsg('追加の対応をお願いしたいのですが、可能でしょうか？')" class="whitespace-nowrap px-3.5 py-1.5 bg-white text-slate-600 text-[10px] font-bold rounded-full border shadow-sm hover:bg-slate-50 active:scale-95 transition">追加要望</button>
                    </div>
                    <div id="chatBox" class="h-[55vh] overflow-y-auto bg-white rounded-2xl p-4 space-y-5 mb-3 border border-slate-200 shadow-sm scroll-smooth"></div>
                    <div class="flex gap-2 bg-white p-2 rounded-2xl border border-slate-200 shadow-sm focus-within:ring-2 focus-within:ring-blue-100 transition">
                        <input type="text" id="chatInput" placeholder="メッセージを入力..." class="flex-1 p-3 bg-transparent text-sm outline-none">
                        <button onclick="sendMsg()" class="bg-slate-900 text-white px-5 rounded-xl font-bold hover:bg-slate-800 active:scale-95 transition shadow-md">送信</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwSbnrFffcQtz-MlJo48xIDeHYYpUJDo-0JwxN83aB72KUVYAdknNfOez6juCksBPER4g/exec";
        
        let currentUser = null, activePid = null, chatInterval = null;
        let currentSchedule = []; 
        const statusMap = { '受注完了': 20, '作業中': 40, 'レビュー中': 60, '支払い待ち': 80, '納品完了': 100 };

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString('ja-JP', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' }); }, 1000);
        window.onload = () => { const id = localStorage.getItem('p2p_id'); if (id) login(id); };

        async function callApi(payload, method = 'GET', silent = false) {
            if(!silent) toggleLoading(true);
            const url = new URL(API_URL);
            const options = { method, mode: 'cors' };
            if (method === 'GET') Object.keys(payload).forEach(k => url.searchParams.append(k, payload[k]));
            else { options.headers = { 'Content-Type': 'text/plain' }; options.body = JSON.stringify(payload); }
            try {
                const res = await fetch(url.toString(), options);
                const data = await res.json();
                if(!silent) toggleLoading(false);
                return data;
            } catch (e) {
                if(!silent) { toggleLoading(false); alert("通信エラーが発生しました。"); }
                return { success: false };
            }
        }

        function toggleLoading(s) { document.getElementById('loadingOverlay').style.display = s ? 'flex' : 'none'; }

        async function login(id) {
            const inputId = id || document.getElementById('userIdInput').value.trim();
            if(!inputId) return;
            const res = await callApi({ action: 'getUser', userId: inputId });
            if (res.success && res.user) {
                currentUser = res.user;
                localStorage.setItem('p2p_id', inputId);
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('mainSection').classList.remove('hidden');
                document.getElementById('userName').innerText = `${res.user.lastName} ${res.user.firstName} 様`;
                document.getElementById('displayId').innerText = `ID: ${res.user.id}`;
                loadProjects();
            } else alert("IDが見つかりません");
        }

        async function loadProjects() {
            const res = await callApi({ action: 'getProjects', userId: currentUser.id });
            if(!res.success) return;
            const list = document.getElementById('projectList');
            if(res.projects.length === 0) return list.innerHTML = `<div class="p-8 text-center text-slate-400 bg-white rounded-2xl border border-dashed">進行中のプロジェクトはありません</div>`;
            
            list.innerHTML = res.projects.map(pj => {
                const prog = statusMap[pj.status] || 0;
                return `
                <div onclick="showDetail('${pj.projectId}')" class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 cursor-pointer hover:shadow-md hover:border-blue-100 active:scale-[0.98] transition group">
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-[10px] font-mono text-slate-400 bg-slate-50 px-2 py-1 rounded">${pj.projectId}</span>
                        <span class="px-2.5 py-1 text-[10px] font-black rounded-lg ${prog === 100 ? 'bg-green-100 text-green-700' : 'bg-blue-50 text-blue-700'}">${pj.status}</span>
                    </div>
                    <h4 class="font-black text-lg text-slate-900 group-hover:text-blue-600 transition">${pj.respondent}</h4>
                    <div class="mt-3 flex justify-between items-end">
                        <p class="text-[10px] font-bold text-slate-400">総額: <span class="text-sm font-black text-slate-800">¥${Number(pj.totalAmount).toLocaleString()}</span></p>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-1.5 mt-3 overflow-hidden">
                        <div class="bg-blue-500 h-1.5 rounded-full progress-bar" style="width: ${prog}%"></div>
                    </div>
                </div>
            `}).join('');
        }

        async function showDetail(pid) {
            activePid = pid;
            const res = await callApi({ action: 'getProjectDetail', projectId: pid });
            if(!res.success) return;
            const pj = res.project;
            currentSchedule = pj.payment.schedule;
            
            document.getElementById('dashboardView').classList.add('hidden');
            document.getElementById('detailView').classList.remove('hidden');
            
            const prog = statusMap[pj.status] || 0;
            
            // ヘッダーUI強化 (PJ名メイン)
            document.getElementById('projectDetailHeader').innerHTML = `
                <div class="bg-gradient-to-br from-slate-900 to-slate-800 text-white p-6 rounded-[2rem] shadow-lg mb-2 relative overflow-hidden">
                    <div class="absolute -right-10 -top-10 w-32 h-32 bg-white/10 blur-2xl rounded-full"></div>
                    <div class="flex justify-between items-start mb-6 relative z-10">
                        <div>
                            <p class="text-[10px] text-slate-400 font-mono mb-1 tracking-widest">${pid}</p>
                            <h3 class="text-2xl font-black tracking-tight leading-tight">${pj.respondent}</h3>
                        </div>
                        <span class="text-[10px] px-3 py-1.5 ${pj.workState==='作業中'?'bg-green-500/20 text-green-300':'bg-red-500/20 text-red-300'} font-bold rounded-full border border-white/10 shadow-inner flex items-center gap-1.5 whitespace-nowrap">
                            <span class="w-2 h-2 rounded-full ${pj.workState==='作業中'?'bg-green-400':'bg-red-400'} animate-pulse"></span>${pj.workState}
                        </span>
                    </div>
                    <div class="space-y-2 relative z-10">
                        <div class="flex justify-between text-xs font-bold"><span class="text-slate-400">ステータス</span><span class="text-blue-200">${pj.status}</span></div>
                        <div class="w-full bg-white/10 rounded-full h-1.5"><div class="bg-blue-400 h-1.5 rounded-full progress-bar" style="width: ${prog}%"></div></div>
                    </div>
                </div>
            `;

            // 滞納・警告メッセージ表示判定
            let warnHtml = '';
            if (pj.warningMsg && pj.warningMsg.trim() !== '') {
                warnHtml = `
                <div class="bg-red-50 border border-red-200 p-4 rounded-2xl mb-4 text-red-800 shadow-sm animate-pulse">
                    <p class="text-[10px] font-black mb-1.5 flex items-center gap-1.5 text-red-600 tracking-widest uppercase"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg> 管理者からの重要なお知らせ</p>
                    <p class="text-sm font-bold leading-relaxed">${pj.warningMsg.replace(/\n/g, '<br>')}</p>
                </div>`;
            }

            document.getElementById('content-overview').innerHTML = warnHtml + `
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                    <h4 class="text-[10px] font-black text-slate-400 border-b border-slate-100 pb-2 mb-4 uppercase tracking-widest">詳細レポート</h4>
                    <p class="text-sm text-slate-700 whitespace-pre-wrap leading-relaxed">${pj.subStatus || '現在、詳細な進捗報告はありません。'}</p>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100"><p class="text-[10px] text-slate-400 font-bold mb-1 uppercase tracking-widest">担当者</p><p class="text-sm font-black text-slate-900">${pj.staff || '未定'}</p></div>
                    <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100"><p class="text-[10px] text-slate-400 font-bold mb-1 uppercase tracking-widest">対応枠</p><p class="text-sm font-black text-slate-900">${pj.respondent}</p></div>
                </div>
            `;

            const pay = pj.payment;
            const feeVal = pay.feeDetail.calculatedFee || 0;
            const grandTotal = Number(pay.totalAmount) + feeVal;

            document.getElementById('paymentHeader').innerHTML = `
                <div class="bg-gradient-to-r from-blue-600 to-blue-500 text-white p-6 rounded-[2rem] shadow-lg shadow-blue-500/20">
                    <p class="text-[10px] opacity-80 font-black mb-1 uppercase tracking-widest">お支払い総額</p>
                    <p class="text-4xl font-black tracking-tighter">¥${grandTotal.toLocaleString()}</p>
                    <div class="mt-5 pt-4 border-t border-white/20 flex justify-between text-xs">
                        <div><p class="opacity-70 mb-0.5">本体価格</p><p class="font-bold text-sm">¥${Number(pay.totalAmount).toLocaleString()}</p></div>
                        <div class="text-right"><p class="opacity-70 mb-0.5">手数料 (${pay.feeDetail.type==='percent'?pay.feeDetail.value+'%':'固定'})</p><p class="font-bold text-sm text-blue-100">+ ¥${feeVal.toLocaleString()}</p></div>
                    </div>
                </div>
            `;

            document.getElementById('payList').innerHTML = pay.schedule.map(s => `
                <div class="flex justify-between items-center p-4 rounded-2xl ${s.status==='支払い済み'||s.status==='振替済' ? 'bg-slate-50 border border-slate-100 opacity-70' : 'bg-white border border-slate-200 shadow-sm'}">
                    <div>
                        <p class="text-[10px] font-bold text-slate-500 mb-1 tracking-wide">${new Date(s.date).toLocaleDateString('ja-JP')} <span class="font-normal text-slate-400 ml-1">${s.note || ''}</span></p>
                        <p class="text-base font-black ${s.status==='支払い済み'||s.status==='振替済' ? 'text-slate-400 line-through' : 'text-slate-900'} flex items-center gap-2">
                            ¥${Number(s.amount).toLocaleString()}
                            <span class="text-[9px] font-bold px-2 py-0.5 rounded-full ${s.method!=='未定'?'bg-blue-50 text-blue-600':'bg-slate-100 text-slate-400'} no-underline">${s.method !== '未定' ? s.method : '方法未指定'}</span>
                        </p>
                    </div>
                    <div class="text-right">
                        <span class="text-[10px] px-2.5 py-1.5 rounded-lg font-bold ${s.status==='支払い済み'?'bg-green-100 text-green-700':s.status==='振替済'?'bg-slate-200 text-slate-600':'bg-white text-slate-600 border shadow-sm'}">${s.status}</span>
                    </div>
                </div>
            `).join('');

            renderCalendar(new Date()); 

            const histRes = await callApi({ action: 'getProjectHistory', projectId: pid });
            document.getElementById('historyTimeline').innerHTML = `
                <div class="absolute left-[15px] top-4 bottom-0 w-0.5 bg-slate-100"></div>
                ${histRes.history.map(h => `
                    <div class="relative pl-10">
                        <div class="absolute left-2 top-2 w-3.5 h-3.5 rounded-full border-[3px] border-white shadow-sm ${h.type === 'Status' ? 'bg-blue-500' : 'bg-slate-300'}"></div>
                        <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                            <div class="flex justify-between items-baseline mb-1.5">
                                <span class="text-[10px] font-black text-slate-500 uppercase tracking-wider">${h.author}</span>
                                <span class="text-[9px] font-bold text-slate-400">${new Date(h.timestamp).toLocaleString('ja-JP')}</span>
                            </div>
                            <p class="text-xs font-bold text-slate-700 leading-relaxed">${h.message}</p>
                        </div>
                    </div>
                `).join('')}
            `;

            startChat(pid);
            switchTab('overview');
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-pane').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('[id^="tab-"]').forEach(el => {
                el.classList.remove('tab-active', 'text-slate-900', 'bg-white', 'shadow-sm', 'rounded-xl');
                el.classList.add('text-slate-400');
            });
            document.getElementById(`content-${t}`).classList.remove('hidden');
            const btn = document.getElementById(`tab-${t}`);
            btn.classList.remove('text-slate-400');
            btn.classList.add('tab-active', 'text-slate-900', 'bg-white', 'shadow-sm', 'rounded-xl');
            if(t === 'chat') document.getElementById('chatBadge').classList.add('hidden');
        }

        // --- カレンダー描画 ---
        let calDate = new Date();
        function togglePayView(v) {
            if(v === 'list') {
                document.getElementById('payList').classList.remove('hidden');
                document.getElementById('payCalendar').classList.add('hidden');
                document.getElementById('btn-view-list').className = "text-[10px] font-bold px-3 py-1.5 rounded-md bg-white text-slate-800 shadow-sm transition";
                document.getElementById('btn-view-cal').className = "text-[10px] font-bold px-3 py-1.5 rounded-md text-slate-500 hover:text-slate-800 transition";
            } else {
                document.getElementById('payList').classList.add('hidden');
                document.getElementById('payCalendar').classList.remove('hidden');
                document.getElementById('btn-view-list').className = "text-[10px] font-bold px-3 py-1.5 rounded-md text-slate-500 hover:text-slate-800 transition";
                document.getElementById('btn-view-cal').className = "text-[10px] font-bold px-3 py-1.5 rounded-md bg-white text-slate-800 shadow-sm transition";
                renderCalendar(calDate);
            }
        }

        function renderCalendar(date) {
            calDate = date;
            const y = date.getFullYear(), m = date.getMonth();
            const firstDay = new Date(y, m, 1).getDay();
            const daysInMonth = new Date(y, m + 1, 0).getDate();
            
            let html = `
                <div class="flex justify-between items-center mb-4 px-2">
                    <button onclick="renderCalendar(new Date(${y}, ${m-1}, 1))" class="w-8 h-8 flex items-center justify-center bg-slate-50 rounded-full hover:bg-slate-100 transition text-slate-600 font-bold">&lt;</button>
                    <span class="text-sm font-black tracking-widest">${y}年 ${m+1}月</span>
                    <button onclick="renderCalendar(new Date(${y}, ${m+1}, 1))" class="w-8 h-8 flex items-center justify-center bg-slate-50 rounded-full hover:bg-slate-100 transition text-slate-600 font-bold">&gt;</button>
                </div>
                <div class="grid grid-cols-7 gap-1 text-center text-[10px] font-black text-slate-400 mb-2">
                    <div class="text-red-400">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div class="text-blue-400">土</div>
                </div>
                <div class="grid grid-cols-7 gap-1.5 text-center">
            `;
            
            for(let i=0; i<firstDay; i++) html += `<div class="p-2"></div>`;
            
            for(let i=1; i<=daysInMonth; i++) {
                const targetStr = `${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;
                const pays = currentSchedule.filter(s => s.date === targetStr);
                
                let cellClass = "p-1 rounded-xl border flex flex-col items-center justify-start h-[52px] relative bg-slate-50/50 border-transparent";
                let inner = `<span class="text-[10px] font-bold text-slate-600">${i}</span>`;
                
                if(pays.length > 0) {
                    const isPaid = pays.every(p => p.status === '支払い済み' || p.status === '振替済');
                    cellClass = `p-1 rounded-xl border-2 flex flex-col items-center justify-start h-[52px] relative cursor-pointer transition ${isPaid ? 'border-slate-200 bg-slate-50' : 'border-blue-200 bg-blue-50 hover:bg-blue-100 hover:scale-105 shadow-sm'}`;
                    inner = `<span class="text-[10px] font-black ${isPaid?'text-slate-400':'text-blue-700'}">${i}</span>`;
                    inner += `<div class="text-[8.5px] font-black ${isPaid?'text-slate-400':'text-blue-800'} mt-1 leading-tight absolute bottom-1.5 w-full text-center tracking-tighter">¥${Number(pays[0].amount).toLocaleString()}</div>`;
                    if(!isPaid) inner += `<div class="absolute -top-1 -right-1 w-2.5 h-2.5 bg-red-500 rounded-full border-2 border-white"></div>`;
                }
                
                html += `<div class="${cellClass}">${inner}</div>`;
            }
            html += `</div>`;
            document.getElementById('payCalendar').innerHTML = html;
        }

        function setChatMsg(msg) {
            const input = document.getElementById('chatInput');
            input.value = msg;
            input.focus();
        }

        let lastMsgCount = 0;
        async function sendMsg() {
            const input = document.getElementById('chatInput');
            if(!input.value.trim()) return;
            const msg = input.value.trim();
            input.value = '';
            await callApi({ action: 'sendMessage', projectId: activePid, sender: 'user', message: msg }, 'POST', true);
            refreshChat(true);
        }

        async function refreshChat(forceScroll = false) {
            if(!activePid) return;
            const res = await callApi({ action: 'getMessages', projectId: activePid }, 'GET', true);
            if(!res.success) return;
            
            const box = document.getElementById('chatBox');
            if(res.messages.length > lastMsgCount && document.getElementById('content-chat').classList.contains('hidden')) {
                document.getElementById('chatBadge').classList.remove('hidden');
            }
            lastMsgCount = res.messages.length;

            box.innerHTML = res.messages.map(m => {
                const isMe = m.sender === 'user';
                const time = new Date(m.timestamp).toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
                return `
                <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} mb-4">
                    <span class="text-[9px] text-slate-400 font-bold mb-1 mx-1 tracking-widest">${isMe ? 'YOU' : 'ADMIN'}</span>
                    <div class="flex items-end gap-1.5 ${isMe ? 'flex-row-reverse' : 'flex-row'}">
                        <div class="max-w-[85%] ${isMe ? 'bg-slate-900 text-white rounded-2xl rounded-tr-sm' : 'bg-slate-100 text-slate-800 rounded-2xl rounded-tl-sm border border-slate-200'} p-3.5 shadow-sm text-sm leading-relaxed">
                            ${m.message}
                        </div>
                        <span class="text-[9px] font-bold text-slate-400 whitespace-nowrap pb-1">${time}</span>
                    </div>
                </div>
            `}).join('');
            
            if(forceScroll || box.scrollTop + box.clientHeight >= box.scrollHeight - 50) box.scrollTop = box.scrollHeight;
        }

        function startChat(pid) {
            if(chatInterval) clearInterval(chatInterval);
            lastMsgCount = 0; refreshChat(true);
            chatInterval = setInterval(refreshChat, 5000);
        }

        function showDashboard() {
            if(chatInterval) clearInterval(chatInterval);
            activePid = null;
            document.getElementById('detailView').classList.add('hidden');
            document.getElementById('dashboardView').classList.remove('hidden');
            loadProjects();
        }

        function refreshData() { if(activePid) showDetail(activePid); else loadProjects(); }
    </script>
</body>
</html>
